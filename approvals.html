<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeClock 365 — Approvals</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f7fa; color: #1C1C1D; }

.header {
  background: #3479E9;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { color: #fff; font-size: 18px; }

.tabs {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 0 32px;
  display: flex;
  gap: 0;
  overflow-x: auto;
}
.tab {
  padding: 14px 18px;
  cursor: pointer;
  font-size: 14px;
  color: #888;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
}
.tab.active { color: #3479E9; border-bottom-color: #3479E9; font-weight: 600; }
.tab .count {
  background: #3479E9;
  color: #fff;
  border-radius: 10px;
  padding: 2px 7px;
  font-size: 11px;
  margin-left: 6px;
}
.tab .count.done { background: #12B76A; }

.bannerbar {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 8px 32px;
  font-size: 12px;
  color: #555;
  display: flex;
  gap: 18px;
  align-items: center;
}
.bannerbar strong { color: #1C1C1D; }
.bannerbar .pill {
  background: #EEF4FF; color: #3479E9;
  padding: 2px 10px; border-radius: 10px;
}

.content { padding: 24px 32px; max-width: 900px; }
.section { display: none; }
.section.active { display: block; }

.card {
  background: #fff;
  border-radius: 8px;
  border: 1px solid #e0e0e0;
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.card.approved { border-color: #12B76A; }
.card.rejected { border-color: #ddd; opacity: 0.6; }
.card.edited   { border-color: #FF981B; }
.card.read     { border-color: #12B76A; opacity: 0.85; }

.card-header {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #f0f0f0;
  background: #fafafa;
}
.card-title { font-weight: 600; font-size: 14px; }
.card-meta { font-size: 12px; color: #888; }

.card-body { padding: 20px; }

.post-text {
  font-size: 15px;
  line-height: 1.7;
  color: #333;
  white-space: pre-wrap;
  background: #f9f9f9;
  border-radius: 6px;
  padding: 16px;
  border-left: 3px solid #3479E9;
}
.post-text[contenteditable="true"] {
  background: #fffbf0;
  border-left-color: #FF981B;
  outline: none;
  cursor: text;
}

.report-text {
  font-size: 14px;
  line-height: 1.8;
  color: #333;
  white-space: pre-wrap;
  background: #f9f9f9;
  border-radius: 6px;
  padding: 16px;
  max-height: 500px;
  overflow-y: auto;
}

.actions {
  padding: 14px 20px;
  display: flex;
  gap: 8px;
  border-top: 1px solid #f0f0f0;
  align-items: center;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 18px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-approve { background: #12B76A; color: #fff; }
.btn-reject  { background: #f5f5f5; color: #888; border: 1px solid #ddd; }
.btn-edit    { background: #FFF3E0; color: #E87A00; border: 1px solid #FFD099; }
.btn-save    { background: #FF981B; color: #fff; display: none; }
.btn-copy    { background: #EEF4FF; color: #3479E9; border: 1px solid #c5d8ff; }
.btn-read    { background: #E8F8EE; color: #12B76A; border: 1px solid #b2e8cc; }

.status-badge {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 600;
  margin-left: auto;
}
.status-pending  { background: #EEF4FF; color: #3479E9; }
.status-approved { background: #E8F8EE; color: #12B76A; }
.status-rejected { background: #f5f5f5; color: #888; }
.status-edited   { background: #FFF3E0; color: #E87A00; }
.status-read     { background: #E8F8EE; color: #12B76A; }

.schedule-line {
  margin-top: 10px;
  font-size: 13px;
  color: #555;
}
.schedule-line .when { font-weight: 600; color: #3479E9; }
.schedule-line .img  { color: #888; margin-left: 12px; }
.schedule-line .pub  { color: #12B76A; font-weight: 600; }
.schedule-line .err  { color: #D92D20; }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: #888;
}
.empty h3 { font-size: 18px; margin-bottom: 8px; color: #555; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1C1C1D;
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 999;
}
.toast.show { opacity: 1; }

.landing-url {
  color: #3479E9;
  font-size: 13px;
  text-decoration: none;
  display: block;
  margin-top: 6px;
}

.insight-list { list-style: none; padding: 0; }
.insight-list li {
  padding: 10px 14px;
  border-left: 3px solid #3479E9;
  background: #f9f9f9;
  margin-bottom: 8px;
  border-radius: 0 6px 6px 0;
  font-size: 14px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <h1>TimeClock 365</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="/" style="color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.12);padding:7px 16px;border-radius:6px;text-decoration:none;font-size:13px;">Leads / CRM</a>
    <a href="/approvals-page" style="color:#fff;background:rgba(255,255,255,0.25);padding:7px 16px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;">Approvals</a>
  </div>
</div>

<div class="bannerbar">
  Banners: <strong id="bn-total">--</strong>
  &middot; used <strong id="bn-used">--</strong>
  &middot; <span class="pill" id="bn-avail">--</span> available
  &middot; daily slots: <strong>11:25, 18:36</strong>
  <span style="margin-left:auto;display:flex;align-items:center;gap:10px;">
    <span id="gen-status" style="font-size:12px;color:#888;"></span>
    <button id="btn-generate" onclick="triggerGeneration()"
      style="background:#3479E9;color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">
      Generate 60 posts
    </button>
  </span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('posts')">
    LinkedIn posts <span class="count" id="count-posts">0</span>
  </div>
  <div class="tab" onclick="switchTab('landings')">
    Landings <span class="count" id="count-landings">0</span>
  </div>
  <div class="tab" onclick="switchTab('competitors')">
    Competitors <span class="count" id="count-competitors">0</span>
  </div>
  <div class="tab" onclick="switchTab('seo')">
    SEO ideas <span class="count" id="count-seo">0</span>
  </div>
  <div class="tab" onclick="switchTab('weekly')">
    Weekly report <span class="count" id="count-weekly">0</span>
  </div>
  <div class="tab" onclick="switchTab('monthly')">
    Monthly report <span class="count" id="count-monthly">0</span>
  </div>
</div>

<div class="content">
  <div id="section-posts" class="section active"><div id="posts-list"></div></div>
  <div id="section-landings" class="section"><div id="landings-list"></div></div>
  <div id="section-competitors" class="section"><div id="competitors-list"></div></div>
  <div id="section-seo" class="section"><div id="seo-list"></div></div>
  <div id="section-weekly" class="section"><div id="weekly-list"></div></div>
  <div id="section-monthly" class="section"><div id="monthly-list"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
let data = { posts: [], landings: [], competitors: [], seo: [], weekly: [], monthly: [] };
const TABS = ['posts','landings','competitors','seo','weekly','monthly'];

async function loadAll() {
  try {
    const [appRes, banRes] = await Promise.all([fetch('/approvals'), fetch('/banners-status')]);
    data = await appRes.json();
    TABS.forEach(k => { if (!data[k]) data[k] = []; });
    const bn = await banRes.json();
    document.getElementById('bn-total').textContent = bn.total;
    document.getElementById('bn-used').textContent  = bn.used;
    document.getElementById('bn-avail').textContent = bn.available;
    renderAll();
  } catch (e) { console.error('load failed:', e); }
}

function fmtDateTime(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  } catch (e) { return iso; }
}

function getStatusBadge(status) {
  const map = {
    pending:  ['status-pending',  'New'],
    approved: ['status-approved', 'Approved'],
    rejected: ['status-rejected', 'Rejected'],
    edited:   ['status-edited',   'Edited'],
    read:     ['status-read',     'Read'],
  };
  const [cls, label] = map[status] || ['status-pending', status];
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function postScheduleLine(post) {
  if (post.publishedAt) {
    const urn = post.linkedinPostUrn ? ` (${post.linkedinPostUrn})` : '';
    return `<div class="schedule-line"><span class="pub">Published ${fmtDateTime(post.publishedAt)}</span>${post.imageUsed ? ` <span class="img">image: ${post.imageUsed}</span>` : ''}${urn}</div>`;
  }
  if (post.dryRunPublishedAt) {
    return `<div class="schedule-line"><span class="pub">Dry-run completed ${fmtDateTime(post.dryRunPublishedAt)}</span>${post.imagePreview ? ` <span class="img">image: ${post.imagePreview}</span>` : ''}</div>`;
  }
  if (post.publishError) {
    return `<div class="schedule-line"><span class="err">Publish error: ${post.publishError}</span></div>`;
  }
  if (post.scheduledFor) {
    return `<div class="schedule-line">Scheduled for <span class="when">${fmtDateTime(post.scheduledFor)}</span></div>`;
  }
  return '';
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
}

function renderPosts() {
  const el = document.getElementById('posts-list');
  if (!data.posts.length) {
    el.innerHTML = `
      <div class="empty">
        <h3>No posts yet</h3>
        <p style="max-width:520px;margin:8px auto 0;line-height:1.7;">
          The agent will generate <strong>60 LinkedIn posts</strong> automatically
          on the <strong>30th of each month</strong>.<br>
          To generate them right now, click the
          <strong>"Generate 60 posts"</strong> button at the top of the page.
          It takes about 1–2 minutes.
        </p>
      </div>`;
    return;
  }
  const pendingCount = data.posts.filter(p => p.status === 'pending').length;
  const bulkBar = pendingCount > 1 ? `
    <div style="background:#fffbf0;border:1px solid #FFD099;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:14px;color:#555;">
        <strong>${pendingCount}</strong> post${pendingCount === 1 ? '' : 's'} waiting for your review.
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-approve" style="font-size:12px;padding:6px 14px;" onclick="approveAllPending()">Approve all ${pendingCount}</button>
        <button class="btn btn-reject" style="font-size:12px;padding:6px 14px;" onclick="rejectAllPending()">Reject all</button>
      </div>
    </div>
  ` : '';
  el.innerHTML = bulkBar + data.posts.map((post, i) => `
    <div class="card ${post.status !== 'pending' ? post.status : ''}">
      <div class="card-header">
        <div>
          <div class="card-title">Post ${i + 1}</div>
          <div class="card-meta">${escapeHtml(post.date || '')} &middot; LinkedIn</div>
        </div>
        ${getStatusBadge(post.status)}
      </div>
      <div class="card-body">
        <div class="post-text" id="text-post-${i}">${escapeHtml(post.editedContent || post.content || '')}</div>
        ${postScheduleLine(post)}
      </div>
      <div class="actions">
        ${post.status === 'pending' ? `
          <button class="btn btn-approve" onclick="approve('posts', ${i})">Approve</button>
          <button class="btn btn-edit"    onclick="startEdit('post', ${i})">Edit</button>
          <button class="btn btn-save" id="save-post-${i}" onclick="saveEdit('posts', ${i})">Save and approve</button>
          <button class="btn btn-reject"  onclick="reject('posts', ${i})">Reject</button>
        ` : `
          <button class="btn btn-copy"   onclick="copyText('post', ${i})">Copy text</button>
          ${post.status !== 'rejected' && !post.publishedAt ? `<button class="btn btn-edit" onclick="undoApproval('posts', ${i})">Change decision</button>` : ''}
        `}
      </div>
    </div>
  `).join('');
}

function renderLandings() {
  const el = document.getElementById('landings-list');
  if (!data.landings.length) {
    el.innerHTML = '<div class="empty"><h3>No landings</h3></div>';
    return;
  }
  el.innerHTML = data.landings.map((landing, i) => `
    <div class="card ${landing.status !== 'pending' ? landing.status : ''}">
      <div class="card-header">
        <div>
          <div class="card-title">${escapeHtml(landing.title || 'Landing ' + (i + 1))}</div>
          <div class="card-meta">${escapeHtml(landing.date || '')} &middot; GitHub Pages</div>
        </div>
        ${getStatusBadge(landing.status)}
      </div>
      <div class="card-body">
        <div class="post-text">${escapeHtml(landing.description || '')}</div>
        ${landing.previewUrl ? `<a class="landing-url" href="${landing.previewUrl}" target="_blank">${escapeHtml(landing.previewUrl)}</a>` : ''}
      </div>
      <div class="actions">
        ${landing.status === 'pending' ? `
          <button class="btn btn-approve" onclick="approve('landings', ${i})">Publish</button>
          <button class="btn btn-reject"  onclick="reject('landings', ${i})">Reject</button>
        ` : `
          ${landing.previewUrl ? `<a href="${landing.previewUrl}" target="_blank" class="btn btn-copy" style="text-decoration:none;">Open</a>` : ''}
          <button class="btn btn-edit" onclick="undoApproval('landings', ${i})">Change decision</button>
        `}
      </div>
    </div>
  `).join('');
}

function renderReports(type, containerId, emptyTitle) {
  const el = document.getElementById(containerId);
  const items = data[type] || [];
  if (!items.length) {
    el.innerHTML = `<div class="empty"><h3>${emptyTitle}</h3></div>`;
    return;
  }
  el.innerHTML = items.map((item, i) => `
    <div class="card ${item.status === 'read' ? 'read' : ''}">
      <div class="card-header">
        <div>
          <div class="card-title">${escapeHtml(item.title || (type + ' ' + (i + 1)))}</div>
          <div class="card-meta">${escapeHtml(item.date || '')}</div>
        </div>
        ${getStatusBadge(item.status)}
      </div>
      <div class="card-body">
        ${item.insights && item.insights.length ? `
          <ul class="insight-list">${item.insights.map(ins => `<li>${escapeHtml(ins)}</li>`).join('')}</ul>
          ${item.content ? `<div class="report-text" style="margin-top:16px;">${escapeHtml(item.content)}</div>` : ''}
        ` : `
          <div class="report-text">${escapeHtml(item.content || item.description || '')}</div>
        `}
      </div>
      <div class="actions">
        ${item.status === 'pending' ? `
          <button class="btn btn-read" onclick="markRead('${type}', ${i})">Mark as read</button>
        ` : `
          <button class="btn btn-reject" style="font-size:12px;" onclick="undoApproval('${type}', ${i})">Mark as new</button>
        `}
        ${item.reportUrl ? `<a href="${item.reportUrl}" target="_blank" class="btn btn-copy" style="text-decoration:none;">Full report</a>` : ''}
      </div>
    </div>
  `).join('');
}

function renderAll() {
  renderPosts();
  renderLandings();
  renderReports('competitors', 'competitors-list', 'No competitor analysis yet');
  renderReports('seo',         'seo-list',         'No SEO ideas yet');
  renderReports('weekly',      'weekly-list',      'No weekly report yet');
  renderReports('monthly',     'monthly-list',     'No monthly report yet');
  updateCounts();
}

function updateCounts() {
  const pending = arr => arr.filter(i => i.status === 'pending').length;
  const done    = arr => arr.filter(i => i.status !== 'pending').length;
  TABS.forEach(type => {
    const el = document.getElementById(`count-${type}`);
    if (!el) return;
    const p = pending(data[type] || []);
    const d = done(data[type] || []);
    el.textContent = p > 0 ? p : (d > 0 ? d : '');
    el.className = 'count' + (p === 0 && d > 0 ? ' done' : '');
    el.style.display = (p === 0 && d === 0) ? 'none' : 'inline-block';
  });
}

async function approve(type, index) {
  await updateItem(type, index, { status: 'approved', approvedAt: new Date().toISOString() });
  showToast(type === 'posts' ? 'Approved. Scheduled for next slot.' : 'Approved.');
}
async function approveAllPending() {
  const pendingIdx = data.posts
    .map((p, i) => ({ p, i }))
    .filter(x => x.p.status === 'pending')
    .map(x => x.i);
  if (!pendingIdx.length) return;
  if (!confirm(`Approve all ${pendingIdx.length} pending posts?\n\nEach one will be auto-scheduled to the next free 11:25 / 18:36 slot, two per day.`)) return;
  showToast(`Approving ${pendingIdx.length} posts…`);
  for (const i of pendingIdx) {
    await fetch('/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'posts', index: i, status: 'approved', approvedAt: new Date().toISOString() }),
    });
  }
  await loadAll();
  showToast(`✓ Approved ${pendingIdx.length} posts.`);
}
async function rejectAllPending() {
  const pendingIdx = data.posts
    .map((p, i) => ({ p, i }))
    .filter(x => x.p.status === 'pending')
    .map(x => x.i);
  if (!pendingIdx.length) return;
  if (!confirm(`Reject all ${pendingIdx.length} pending posts? This cannot be undone in bulk.`)) return;
  for (const i of pendingIdx) {
    await fetch('/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'posts', index: i, status: 'rejected' }),
    });
  }
  await loadAll();
  showToast(`Rejected ${pendingIdx.length} posts.`);
}
async function reject(type, index) {
  await updateItem(type, index, { status: 'rejected' });
  showToast('Rejected.');
}
async function markRead(type, index) {
  await updateItem(type, index, { status: 'read', approvedAt: new Date().toISOString() });
  showToast('Marked as read.');
}
function startEdit(type, index) {
  const el = document.getElementById(`text-${type}-${index}`);
  if (!el) return;
  el.contentEditable = 'true';
  el.focus();
  const saveBtn = document.getElementById(`save-${type}-${index}`);
  if (saveBtn) saveBtn.style.display = 'inline-block';
}
async function saveEdit(type, index) {
  const el = document.getElementById(`text-${type.slice(0,-1)}-${index}`);
  const edited = el ? el.innerText : '';
  if (el) el.contentEditable = 'false';
  await updateItem(type, index, {
    status: 'edited', editedContent: edited, approvedAt: new Date().toISOString()
  });
  showToast('Edited and approved.');
}
async function undoApproval(type, index) {
  await updateItem(type, index, { status: 'pending', approvedAt: null });
  showToast('Decision undone.');
}
function copyText(type, index) {
  const el = document.getElementById(`text-${type}-${index}`);
  if (el) {
    navigator.clipboard.writeText(el.innerText);
    showToast('Copied to clipboard.');
  }
}
async function updateItem(type, index, changes) {
  await fetch('/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type, index, ...changes })
  });
  await loadAll();
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', TABS[i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`section-${tab}`).classList.add('active');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadGenerationStatus() {
  try {
    const res = await fetch('/generation-status');
    const s = await res.json();
    const el = document.getElementById('gen-status');
    const btn = document.getElementById('btn-generate');
    if (!s.apiKeySet) {
      el.textContent = 'ANTHROPIC_API_KEY not set';
      el.style.color = '#D92D20';
      btn.disabled = true;
      btn.style.opacity = '0.4';
      return;
    }
    if (s.running) {
      el.textContent = 'Generating…';
      el.style.color = '#FF981B';
      btn.disabled = true;
      btn.style.opacity = '0.4';
    } else {
      const when = s.lastGeneratedAt
        ? 'Last: ' + new Date(s.lastGeneratedAt).toLocaleDateString()
        : 'Never generated';
      el.textContent = when;
      el.style.color = '#888';
      btn.disabled = false;
      btn.style.opacity = '1';
    }
  } catch (e) {}
}

async function triggerGeneration() {
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.style.opacity = '0.4';
  document.getElementById('gen-status').textContent = 'Starting…';
  try {
    const res = await fetch('/generate-posts', { method: 'POST' });
    const d = await res.json();
    if (d.error) {
      showToast('Error: ' + d.error);
      loadGenerationStatus();
    } else {
      showToast(d.message);
      document.getElementById('gen-status').textContent = 'Generating…';
      document.getElementById('gen-status').style.color = '#FF981B';
      setTimeout(() => { loadAll(); loadGenerationStatus(); }, 5000);
    }
  } catch (e) {
    showToast('Request failed');
    loadGenerationStatus();
  }
}

loadAll();
