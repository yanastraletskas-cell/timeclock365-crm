<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeClock 365 — CRM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f7fa; color: #1C1C1D; }

  .header {
    background: #3479E9;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { color: #fff; font-size: 18px; }
  .header span { color: rgba(255,255,255,0.7); font-size: 13px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px 32px 0;
  }
  .stat {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    border-left: 4px solid #e0e0e0;
  }
  .stat.total     { border-color: #3479E9; }
  .stat.today     { border-color: #FF981B; }
  .stat.contacted { border-color: #E87A00; }
  .stat.converted { border-color: #12B76A; }
  .stat-number { font-size: 32px; font-weight: 700; }
  .stat-label  { font-size: 13px; color: #888; margin-top: 4px; }

  .table-wrap {
    margin: 24px 32px;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .table-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
  }
  .table-header h2 { font-size: 15px; }
  .btn-export {
    background: #3479E9;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 12px;
    text-transform: uppercase;
    color: #888;
    border-bottom: 1px solid #eee;
    background: #fafafa;
  }
  td {
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: top;
  }
  tr:hover td { background: #f9fbff; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-new       { background: #EEF4FF; color: #3479E9; }
  .badge-contacted { background: #FFF6E0; color: #FF981B; }
  .badge-hot       { background: #FFF0F0; color: #D92D20; }
  .badge-demo      { background: #FFF0E0; color: #E87A00; }
  .badge-converted { background: #E8F8EE; color: #0D8A4A; }
  .badge-lost      { background: #f5f5f5; color: #888; }

  .source-tag {
    font-size: 11px;
    background: #f0f0f0;
    padding: 2px 8px;
    border-radius: 4px;
    color: #555;
  }

  select {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    background: #fff;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: #555; }

  .loading { text-align: center; padding: 40px; color: #888; }

  .note-input {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    width: 200px;
  }
  .btn-save {
    background: #f0f0f0;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    margin-left: 4px;
  }
  .btn-save:hover { background: #e0e0e0; }
</style>
</head>
<body>

<div class="header">
  <h1>TimeClock 365</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="/" style="color:#fff;background:rgba(255,255,255,0.25);padding:7px 16px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;">Leads / CRM</a>
    <a href="/approvals-page" style="color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.12);padding:7px 16px;border-radius:6px;text-decoration:none;font-size:13px;" id="approvals-link">Approvals <span id="pending-count" style="background:#FF981B;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;"></span></a>
    <span id="lastUpdate" style="color:rgba(255,255,255,0.6);font-size:12px;margin-left:8px;"></span>
  </div>
</div>

<div class="stats">
  <div class="stat total">
    <div class="stat-number" id="stat-total">--</div>
    <div class="stat-label">Total leads</div>
  </div>
  <div class="stat today">
    <div class="stat-number" id="stat-today">--</div>
    <div class="stat-label">New today</div>
  </div>
  <div class="stat contacted">
    <div class="stat-number" id="stat-contacted">--</div>
    <div class="stat-label">Contacted</div>
  </div>
  <div class="stat converted">
    <div class="stat-number" id="stat-converted">--</div>
    <div class="stat-label">Converted</div>
  </div>
</div>

<div class="table-wrap">
  <div class="table-header">
    <h2>All leads</h2>
    <button class="btn-export" onclick="exportCSV()">Export CSV</button>
  </div>
  <div id="tableContainer"><div class="loading">Loading...</div></div>
</div>

<script>
let allLeads = [];

async function loadPendingCount() {
  try {
    const res = await fetch('/approvals');
    const data = await res.json();
    const count = [
      ...(data.posts || []),
      ...(data.landings || []),
      ...(data.competitors || []),
      ...(data.seo || []),
      ...(data.weekly || []),
      ...(data.monthly || []),
    ].filter(i => i.status === 'pending').length;
    const el = document.getElementById('pending-count');
    if (el) el.textContent = count > 0 ? count : '';
  } catch(e) {}
}

async function loadLeads() {
  try {
    const res = await fetch('/subscribers');
    const data = await res.json();
    allLeads = data;
    renderTable(data);
    renderStats(data);
    document.getElementById('lastUpdate').textContent =
      'Updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('tableContainer').innerHTML =
      '<div class="empty"><h3>Failed to load</h3><p>Make sure the server is running</p></div>';
  }
}

function renderStats(leads) {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('stat-total').textContent     = leads.length;
  document.getElementById('stat-today').textContent     = leads.filter(l => l.subscribedAt && l.subscribedAt.startsWith(today)).length;
  document.getElementById('stat-contacted').textContent = leads.filter(l => l.status === 'contacted' || l.status === 'hot' || l.status === 'demo').length;
  document.getElementById('stat-converted').textContent = leads.filter(l => l.status === 'converted').length;
}

function getStatusBadge(lead) {
  const status = lead.status || 'new';
  const map = {
    new:       ['badge-new',       'New'],
    contacted: ['badge-contacted', 'Contacted'],
    hot:       ['badge-hot',       'Hot'],
    demo:      ['badge-demo',      'Demo booked'],
    converted: ['badge-converted', 'Customer'],
    lost:      ['badge-lost',      'Lost'],
  };
  const [cls, label] = map[status] || ['badge-new', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
}

function renderTable(leads) {
  if (leads.length === 0) {
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty">
        <h3>No leads yet</h3>
        <p>Once someone fills out a landing-page form, they will show up here.</p>
      </div>`;
    return;
  }

  const rows = leads.map((lead, i) => `
    <tr>
      <td style="color:#888;font-size:12px;">#${i + 1}</td>
      <td><strong>${escapeHtml(lead.name || '--')}</strong></td>
      <td style="color:#3479E9;">${escapeHtml(lead.email)}</td>
      <td><span class="source-tag">${escapeHtml(lead.source || 'landing')}</span></td>
      <td style="color:#888;font-size:13px;">${lead.subscribedAt ? lead.subscribedAt.slice(0, 10) : '--'}</td>
      <td>
        <select onchange="updateStatus('${escapeHtml(lead.email)}', this.value)">
          <option value="new"       ${(lead.status||'new')==='new'       ? 'selected':''}>New</option>
          <option value="contacted" ${lead.status==='contacted' ? 'selected':''}>Contacted</option>
          <option value="hot"       ${lead.status==='hot'       ? 'selected':''}>Hot</option>
          <option value="demo"      ${lead.status==='demo'      ? 'selected':''}>Demo booked</option>
          <option value="converted" ${lead.status==='converted' ? 'selected':''}>Customer</option>
          <option value="lost"      ${lead.status==='lost'      ? 'selected':''}>Lost</option>
        </select>
      </td>
      <td>
        <input class="note-input" type="text" placeholder="Note..."
          value="${escapeHtml(lead.notes || '')}" id="note-${lead.email.replace(/[@.]/g, '_')}">
        <button class="btn-save" onclick="saveNote('${escapeHtml(lead.email)}')">Save</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Source</th>
          <th>Date</th>
          <th>Status</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateStatus(email, status) {
  await fetch('/update-lead', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, status })
  });
  loadLeads();
}

async function saveNote(email) {
  const key = email.replace(/[@.]/g, '_');
  const notes = document.getElementById('note-' + key)?.value || '';
  await fetch('/update-lead', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, notes })
  });
}

function exportCSV() {
  const headers = ['Name','Email','Source','Date','Status','Notes'];
  const rows = allLeads.map(l => [
    l.name, l.email, l.source||'landing',
    l.subscribedAt?.slice(0, 10),
    l.status || 'new',
    l.notes || ''
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `leads-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

loadLeads();
loadPendingCount();
setInterval(loadLeads, 30000);
setInterval(loadPendingCount, 30000);
</script>
</body>
</html>
